    const { useState, useEffect, useRef } = React;

    // ==========================================================
    // 3. COMPONENTE PRINCIPAL (APP)
    // ==========================================================
    function App() {
      const [user, setUser] = useState(null);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [playerName, setPlayerName] = useState('');
      const [roomCodeInput, setRoomCodeInput] = useState('');
      const [room, setRoom] = useState(null);
      const [currentRoomId, setCurrentRoomId] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      useEffect(() => {
        const initAuth = async () => {
          try { await auth.signInAnonymously(); } 
          catch (err) { 
              console.error(err);
              setErrorMsg("Erro ao conectar no banco de dados."); 
          }
        };
        initAuth();
        const unsubscribe = auth.onAuthStateChanged((u) => { setUser(u); setLoadingAuth(false); });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !currentRoomId) return;
        const roomRef = getRoomRef(currentRoomId);
        const unsubscribe = roomRef.onSnapshot((snapshot) => {
          if (snapshot.exists) setRoom(snapshot.data());
          else { setRoom(null); setCurrentRoomId(null); setErrorMsg("Sala fechada ou inexistente."); }
        });
        return () => unsubscribe();
      }, [user, currentRoomId]);

      // FUNÇÃO MESTRE: EVITA PULO DE JOGADORES (CORREÇÃO DE BUG)
      const executeTurnAdvance = async (roomId, targetUid, hint = null) => {
          const roomRef = getRoomRef(roomId);
          const doc = await roomRef.get();
          const d = doc.data();
          const state = d.gameState;

          // Proteção contra Condição de Corrida: Se não for mais o turno desse jogador, não faça nada.
          if (state.currentTurnIndex >= state.turnOrder.length || state.turnOrder[state.currentTurnIndex] !== targetUid) return;

          const updates = {};
          if (hint) {
              updates['gameState.hints'] = { ...state.hints, [targetUid]: hint };
              const updatedAllHints = { ...state.allHints };
              updatedAllHints[targetUid] = [...(updatedAllHints[targetUid] || []), hint];
              updates['gameState.allHints'] = updatedAllHints;
          }

          const nextIndex = state.currentTurnIndex + 1;
          updates['gameState.currentTurnIndex'] = nextIndex;

          if (nextIndex >= state.turnOrder.length) {
              updates.status = 'discussing'; // Usaremos a tela de discussing para revisão
              updates['gameState.phaseDeadline'] = Date.now() + 10000; // FIXO: 10 Segundos de animação e revisão
          } else {
              updates['gameState.turnDeadline'] = Date.now() + (d.settings.hintTime * 1000);
          }

          await roomRef.update(updates);
      };

      const handleNextPhaseFromReview = async (currentRoom, state) => {
          const roomRef = getRoomRef(currentRoom.id);
          if (state.currentRound < state.totalRounds) {
              await roomRef.update({
                  status: 'hinting',
                  'gameState.currentRound': state.currentRound + 1,
                  'gameState.currentTurnIndex': 0,
                  'gameState.hints': {}, 
                  'gameState.turnDeadline': Date.now() + (currentRoom.settings.hintTime * 1000)
              });
          } else {
              await roomRef.update({ 
                  status: 'voting',
                  'gameState.voteDeadline': Date.now() + ((currentRoom.settings.voteTime || 60) * 1000)
              });
          }
      };

      // RELÓGIO MESTRE E BOTS
      useEffect(() => {
        if (!user || !room || room.hostId !== user.uid) return;

        const interval = setInterval(async () => {
          const now = Date.now();
          const state = room.gameState;

          if (room.status === 'hinting' && state?.turnDeadline) {
            const currentUid = state.turnOrder[state.currentTurnIndex];
            const isBot = room.players[currentUid]?.isBot;
            
            if (isBot && !state.hints[currentUid]) {
                const turnDuration = room.settings.hintTime * 1000;
                if ((state.turnDeadline - now) < (turnDuration - 3000)) {
                    const genericHints = ["Sempre vejo", "As pessoas gostam", "Tem na TV", "Bem clássico", "Muito legal", "É popular", "Muitos conhecem"];
                    const botHint = genericHints[Math.floor(Math.random() * genericHints.length)];
                    await executeTurnAdvance(room.id, currentUid, botHint);
                }
            } else if (now >= state.turnDeadline && !isBot) {
                // O tempo da pessoa real esgotou
                await executeTurnAdvance(room.id, currentUid, null);
            }
          } 
          else if (room.status === 'discussing' && state?.phaseDeadline) {
            // Tempo dos 10 segundos da revisão acabou
            if (now >= state.phaseDeadline) {
                await handleNextPhaseFromReview(room, state);
            }
          } 
          else if (room.status === 'voting') {
             if (state?.voteDeadline && now >= state.voteDeadline) {
                 await getRoomRef(room.id).update({ status: 'finished' });
             }

             const bots = Object.keys(room.players).filter(id => room.players[id].isBot);
             bots.forEach(botUid => {
                 if (!state.votes[botUid] && Math.random() < 0.2) { 
                     const roomRef = getRoomRef(room.id);
                     roomRef.get().then(doc => {
                         const d = doc.data();
                         if (!d.gameState.votes[botUid]) {
                             const targets = Object.keys(d.players).filter(id => id !== botUid);
                             const target = targets[Math.floor(Math.random() * targets.length)];
                             const newVotes = { ...d.gameState.votes, [botUid]: target };
                             roomRef.update({ 'gameState.votes': newVotes }).then(() => {
                                 if (Object.keys(newVotes).length === Object.keys(d.players).length) {
                                     roomRef.update({ status: 'finished' });
                                 }
                             });
                         }
                     });
                 }
             });
          }
        }, 1000);
        return () => clearInterval(interval);
      }, [room, user]);

      const handleCreateRoom = async () => {
        if (!playerName.trim()) return setErrorMsg("Digite seu nome primeiro!");
        const newRoomId = generateRoomCode();
        const roomRef = getRoomRef(newRoomId);
        const initialData = {
          id: newRoomId, hostId: user.uid, status: 'lobby',
          // O tempo de review (antigo discuss) agora é fixo no código, deixamos apenas os configuráveis aqui
          settings: { categoryPreset: 'Animais', hintTime: 15, voteTime: 60, impostorsCount: 1, roundsCount: 1 },
          players: { [user.uid]: { name: playerName, isHost: true } },
          usedWords: [], 
          gameState: null
        };
        try {
          await roomRef.set(initialData);
          setCurrentRoomId(newRoomId);
          setErrorMsg('');
        } catch (err) { 
            console.error(err);
            setErrorMsg("Erro ao criar sala. Verifique as regras do Firestore."); 
        }
      };

      const handleJoinRoom = async (e) => {
        e.preventDefault();
        if (!playerName.trim()) return setErrorMsg("Digite seu nome primeiro!");
        if (!roomCodeInput.trim()) return setErrorMsg("Digite o código da sala!");
        const code = roomCodeInput.trim().toUpperCase();
        const roomRef = getRoomRef(code);
        try {
          const docSnap = await roomRef.get();
          if (!docSnap.exists) return setErrorMsg("Sala não encontrada.");
          const roomData = docSnap.data();
          if (roomData.status !== 'lobby') return setErrorMsg("O jogo já começou.");
          const updatedPlayers = { ...roomData.players };
          updatedPlayers[user.uid] = { name: playerName, isHost: false };
          await roomRef.update({ players: updatedPlayers });
          setCurrentRoomId(code);
          setErrorMsg('');
        } catch (err) { setErrorMsg("Erro ao entrar. Verifique permissões."); }
      };

      const leaveRoom = async () => {
        if (room && room.players[user.uid]) {
          const roomRef = getRoomRef(room.id);
          const updatedPlayers = { ...room.players };
          delete updatedPlayers[user.uid];
          if (Object.keys(updatedPlayers).length === 0) {
            await roomRef.delete();
          } else {
            let newHostId = room.hostId;
            if (room.hostId === user.uid) {
              newHostId = Object.keys(updatedPlayers)[0];
              updatedPlayers[newHostId].isHost = true;
            }
            await roomRef.update({ players: updatedPlayers, hostId: newHostId });
          }
        }
        setCurrentRoomId(null);
        setRoom(null);
      };

      const handleAddBot = async () => {
         const botNames = ["Jogador 2", "Visitante", "Convidado", "Misterioso", "Sombra"];
         const randomName = botNames[Math.floor(Math.random() * botNames.length)] + ' ' + Math.floor(Math.random()*100);
         const botUid = 'bot_' + Date.now() + Math.floor(Math.random()*1000);
         const roomRef = getRoomRef(room.id);
         await roomRef.update({ [`players.${botUid}`]: { name: randomName, isBot: true, isHost: false } });
      };

      const handleRemoveBot = async (botUid) => {
         const roomRef = getRoomRef(room.id);
         const updatedPlayers = { ...room.players };
         delete updatedPlayers[botUid];
         await roomRef.update({ players: updatedPlayers });
      };

      const [isStartingGame, setIsStartingGame] = useState(false);

      const startGame = async () => {
        const playerIds = Object.keys(room.players);
        if (playerIds.length < 3) return setErrorMsg("Mínimo de 3 jogadores na sala.");

        setIsStartingGame(true);

        const requestedImpostors = room.settings.impostorsCount || 1;
        const maxImpostors = Math.max(1, Math.floor(playerIds.length / 2)); 
        const actualImpostorsCount = Math.min(requestedImpostors, maxImpostors);

        let category = room.settings.categoryPreset || 'Animais';

        const currentUsedWords = room.usedWords || [];
        const wordsDict = FALLBACK_DICTIONARY[category] || FALLBACK_DICTIONARY["Animais"];
        
        let availableWords = wordsDict.filter(w => !currentUsedWords.includes(w));
        
        if (availableWords.length === 0) {
            availableWords = wordsDict;
        }

        const secretWord = availableWords[Math.floor(Math.random() * availableWords.length)];
        const nextUsedWords = [...currentUsedWords, secretWord]; 
        
        const shuffled = [...playerIds].sort(() => Math.random() - 0.5);
        const impostorIds = shuffled.slice(0, actualImpostorsCount);
        const turnOrder = [...playerIds].sort(() => Math.random() - 0.5);

        const roomRef = getRoomRef(room.id);
        await roomRef.update({
          status: 'hinting',
          usedWords: nextUsedWords,
          gameState: {
            word: secretWord, impostorIds: impostorIds, turnOrder: turnOrder,
            currentRound: 1, totalRounds: room.settings.roundsCount || 1,
            currentTurnIndex: 0, turnDeadline: Date.now() + (room.settings.hintTime * 1000),
            hints: {}, allHints: {}, votes: {}
          }
        });
        
        setIsStartingGame(false);
        setErrorMsg('');
      };

      const submitHint = async (hint) => {
        if (!hint.trim()) return;
        // Delega o avanço para a nossa função que previne os bugs
        await executeTurnAdvance(room.id, user.uid, hint);
      };

      const submitVote = async (targetUid) => {
        const roomRef = getRoomRef(room.id);
        const updatedVotes = { ...room.gameState.votes, [user.uid]: targetUid };
        await roomRef.update({ 'gameState.votes': updatedVotes });
        if (Object.keys(updatedVotes).length === Object.keys(room.players).length) {
          await roomRef.update({ status: 'finished' });
        }
      };

      const restartGame = async () => {
        const roomRef = getRoomRef(room.id);
        await roomRef.update({ status: 'lobby', gameState: null });
      };

      const updateSetting = async (key, value) => {
        const roomRef = getRoomRef(room.id);
        await roomRef.update({ [`settings.${key}`]: value });
      };

      const getThemeClass = (category) => {
          switch(category) {
              case 'Naruto': return 'theme-naruto';
              case 'Time / Seleção':
              case 'Jogador de Futebol': return 'theme-futebol';
              case 'Comida': return 'theme-comida';
              case 'Cidade':
              case 'País': return 'theme-lugares';
              case 'Profissões': return 'theme-profissoes';
              case 'Filme': return 'theme-filmes';
              default: return ''; 
          }
      };

      if (loadingAuth) {
        return <div className="min-h-screen flex items-center justify-center"><i className="ph ph-spinner-gap text-5xl animate-spin text-white"></i></div>;
      }

      const categoryTheme = room?.settings?.categoryPreset || 'Animais';
      const themeClass = getThemeClass(categoryTheme);

      return (
        <div className={`w-full min-h-screen ${themeClass} flex flex-col relative transition-colors duration-1000`}>
          <div className="bg-orbs">
            <div className="orb-1"></div>
            <div className="orb-2"></div>
            <div className="pattern-overlay"></div>
          </div>

          <div className="max-w-[480px] w-full mx-auto flex-1 flex flex-col relative z-10 px-4 py-6">
            <header className="flex justify-between items-center mb-6">
              <div className="flex items-center gap-2 font-bold text-xl tracking-tight">
                {categoryTheme === 'Naruto' && room?.status !== 'finished' ? (
                   <i className="ph-fill ph-star text-2xl animate-spin-slow" style={{animationDuration: '10s'}}></i>
                ) : (
                   <i className="ph-fill ph-ghost text-2xl"></i>
                )}
                <span>Infiltrado</span>
              </div>
              {room && (
                <button onClick={leaveRoom} className="flex items-center gap-1 text-xs font-semibold px-4 py-2 rounded-full glass-card hover:bg-white/10 transition-colors">
                  <i className="ph-bold ph-sign-out"></i> Sair
                </button>
              )}
            </header>

            {errorMsg && (
              <div className="absolute top-20 left-1/2 -translate-x-1/2 w-[90%] bg-red-500/90 backdrop-blur-md text-white px-6 py-4 rounded-2xl flex items-center gap-3 z-50 animate-in slide-in-from-top-4 shadow-2xl border border-red-400/50">
                <i className="ph-fill ph-warning-circle text-2xl"></i>
                <p className="font-medium text-sm">{errorMsg}</p>
                <button onClick={() => setErrorMsg('')} className="ml-auto"><i className="ph-bold ph-x"></i></button>
              </div>
            )}

            <div className="flex-1 flex flex-col w-full h-full">
              {!currentRoomId || !room ? (
                <HomeScreen playerName={playerName} setPlayerName={setPlayerName} roomCodeInput={roomCodeInput} setRoomCodeInput={setRoomCodeInput} handleCreateRoom={handleCreateRoom} handleJoinRoom={handleJoinRoom} />
              ) : (
                <GameContainer 
                    room={room} user={user} startGame={startGame} submitHint={submitHint} submitVote={submitVote} 
                    restartGame={restartGame} updateSetting={updateSetting} handleAddBot={handleAddBot} handleRemoveBot={handleRemoveBot}
                    isStartingGame={isStartingGame} categoryTheme={categoryTheme}
                />
              )}
            </div>

          </div>
        </div>
      );
    }

    function GameContainer(props) {
      switch (props.room.status) {
        case 'lobby': return <LobbyScreen {...props} isHost={props.room.hostId === props.user.uid} />;
        case 'hinting': return <HintingScreen {...props} />;
        case 'discussing': return <ReviewScreen {...props} />;
        case 'voting': return <VotingScreen {...props} />;
        case 'finished': return <ResultScreen {...props} isHost={props.room.hostId === props.user.uid} />;
        default: return <div>Erro de estado.</div>;
      }
    }

    function HomeScreen({ playerName, setPlayerName, roomCodeInput, setRoomCodeInput, handleCreateRoom, handleJoinRoom }) {
      return (
        <div className="flex-1 flex flex-col justify-center gap-8 animate-in fade-in duration-500">
          <div className="flex justify-center items-center flex-col gap-4">
            <div className="w-32 h-32 rounded-[2rem] glass-card flex items-center justify-center shadow-2xl relative overflow-hidden">
               <div className="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent"></div>
               <i className="ph-fill ph-detective text-white text-[70px] drop-shadow-lg relative z-10"></i>
            </div>
            <div className="text-center">
              <h1 className="text-4xl font-bold tracking-tight">O Infiltrado</h1>
              <p className="text-white/60 text-sm mt-1 font-medium">Descubra quem não sabe a palavra.</p>
            </div>
          </div>

          <div className="glass-card p-6 flex flex-col gap-6">
            <div className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-white/60 mb-2 uppercase tracking-wider ml-1">Como te chamam?</label>
                <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="Seu apelido..." className="w-full glass-input rounded-2xl px-5 py-4 text-white font-medium transition-all" maxLength={15} />
              </div>
              <button onClick={handleCreateRoom} className="w-full btn-gradient rounded-full text-white font-bold py-4 text-lg flex justify-center items-center gap-2">
                <i className="ph-bold ph-plus-circle text-xl"></i> Criar Nova Sala
              </button>
            </div>

            <div className="flex items-center gap-4 py-2">
              <div className="flex-1 border-t border-white/10"></div>
              <span className="text-white/30 text-xs font-bold uppercase tracking-widest">OU</span>
              <div className="flex-1 border-t border-white/10"></div>
            </div>

            <form onSubmit={handleJoinRoom} className="space-y-3">
              <input type="text" value={roomCodeInput} onChange={e => setRoomCodeInput(e.target.value.toUpperCase())} placeholder="CÓDIGO DA SALA" className="w-full glass-input rounded-2xl px-5 py-4 text-center font-mono font-bold text-xl tracking-[0.3em] uppercase" maxLength={4} />
              <button type="submit" className="w-full bg-white/10 hover:bg-white/20 border border-white/10 text-white font-bold py-4 rounded-full transition-all">
                Entrar na Sala
              </button>
            </form>

          </div>
          
          <a href="https://discord.gg/8aemaeSRnb" target="_blank" rel="noopener noreferrer" className="glass-card bg-[#5865F2]/10 hover:bg-[#5865F2]/20 border border-[#5865F2]/30 p-4 rounded-2xl flex items-center justify-center gap-3 transition-all group shadow-[0_0_15px_rgba(88,101,242,0.15)]">
            <i className="ph-fill ph-discord-logo text-[#5865F2] text-3xl group-hover:scale-110 transition-transform duration-300"></i>
            <div className="text-left flex flex-col">
              <span className="text-white font-bold text-sm leading-tight">Entrar no Discord</span>
              <span className="text-[#5865F2] text-[10px] uppercase tracking-widest font-semibold">Jogue em Call de Voz</span>
            </div>
          </a>
        </div>
      );
    }

    function LobbyScreen({ room, isHost, startGame, updateSetting, user, handleAddBot, handleRemoveBot, isStartingGame, categoryTheme }) {
      const players = Object.entries(room.players);
      return (
        <div className="flex-1 flex flex-col animate-in slide-in-from-right duration-300">
          <div className="glass-card p-8 text-center mb-6 relative overflow-hidden group">
            <div className="absolute inset-0 bg-gradient-to-br from-[var(--color-glow-1)]/10 to-transparent"></div>
            <p className="text-white/60 text-xs uppercase tracking-widest font-semibold mb-2 relative z-10">Código da Missão</p>
            <div className="text-6xl font-black font-mono tracking-widest text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] select-all cursor-pointer relative z-10">
               {room.id}
            </div>
          </div>

          <div className="flex-1 glass-card p-6 flex flex-col overflow-y-auto no-scrollbar pb-8">
            <div className="flex items-center justify-between mb-6">
              <h3 className="font-bold text-lg flex items-center gap-2">
                Jogadores <span className="bg-white/20 text-white px-2.5 py-0.5 rounded-full text-xs">{players.length}</span>
              </h3>
              {isHost && (
                <button onClick={handleAddBot} className="text-xs font-semibold bg-white/10 hover:bg-white/20 border border-white/10 px-4 py-1.5 rounded-full transition-colors flex items-center gap-1.5">
                   <i className="ph-bold ph-robot"></i> Adicionar Bot
                </button>
              )}
            </div>
            
            <div className="grid grid-cols-2 gap-3 mb-8">
              {players.map(([uid, p]) => (
                <div key={uid} className={`bg-white/5 border border-white/10 p-2.5 rounded-[1.25rem] flex items-center gap-3 relative ${uid === user.uid ? 'ring-1 ring-[var(--color-accent)] bg-white/10' : ''}`}>
                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-white text-lg shadow-inner ${p.isHost ? 'bg-gradient-to-br from-[var(--color-glow-1)] to-[var(--color-glow-2)]' : 'bg-black/40'}`}>
                    {p.isBot ? <i className="ph-fill ph-robot"></i> : p.name.charAt(0).toUpperCase()}
                  </div>
                  <div className="flex-1 min-w-0 pr-2">
                    <div className="font-medium text-sm truncate">{p.name}</div>
                    {p.isHost && <div className="text-[9px] text-[var(--color-accent)] font-bold uppercase tracking-wider">Líder</div>}
                  </div>
                  {p.isBot && isHost && (
                     <button onClick={() => handleRemoveBot(uid)} className="absolute right-2 top-1/2 -translate-y-1/2 text-white/30 hover:text-red-400 transition-colors p-1">
                        <i className="ph-bold ph-x text-lg"></i>
                     </button>
                  )}
                </div>
              ))}
            </div>

            <div className="mt-auto pt-6 border-t border-white/10">
              <h3 className="font-bold text-xs text-white/50 uppercase tracking-widest mb-4 ml-1">Configurações</h3>
              
              <div className="space-y-4">
                <div>
                  <label className="block text-[10px] font-semibold text-white/60 mb-1.5 uppercase tracking-wider ml-1">Tema (Palavras)</label>
                  <select 
                    disabled={!isHost} 
                    value={room.settings.categoryPreset || 'Animais'} 
                    onChange={e => updateSetting('categoryPreset', e.target.value)} 
                    className="w-full glass-input rounded-xl px-4 py-3.5 text-sm font-medium disabled:opacity-50"
                  >
                    <option value="Animais">🐾 Animais</option>
                    <option value="Comida">🍕 Comida</option>
                    <option value="Profissões">👨‍⚕️ Profissões</option>
                    <option value="Cidade">🏙️ Cidades</option>
                    <option value="País">🌎 Países</option>
                    <option value="Time / Seleção">⚽ Times e Seleções</option>
                    <option value="Jogador de Futebol">🏃 Jogadores de Futebol</option>
                    <option value="Filme">🎬 Filmes</option>
                    <option value="Naruto">🍥 Naruto (Anime)</option>
                  </select>
                </div>

                <div className="flex gap-4">
                  <div className="flex-1">
                    <label className="block text-[10px] font-semibold text-white/60 mb-1.5 uppercase tracking-wider ml-1">Rodadas</label>
                    <select disabled={!isHost} value={room.settings.roundsCount || 1} onChange={e => updateSetting('roundsCount', parseInt(e.target.value))} className="w-full glass-input rounded-xl px-4 py-3.5 text-sm text-center font-medium disabled:opacity-50">
                      <option value={1}>1x</option>
                      <option value={2}>2x</option>
                      <option value={3}>3x</option>
                    </select>
                  </div>
                  <div className="flex-1">
                    <label className="block text-[10px] font-semibold text-white/60 mb-1.5 uppercase tracking-wider ml-1">Impostores</label>
                    <select disabled={!isHost} value={room.settings.impostorsCount || 1} onChange={e => updateSetting('impostorsCount', parseInt(e.target.value))} className="w-full glass-input rounded-xl px-4 py-3.5 text-sm text-center font-medium disabled:opacity-50">
                      <option value={1}>1</option>
                      <option value={2}>2</option>
                      <option value={3}>3</option>
                    </select>
                  </div>
                </div>

                <div className="flex gap-4 mt-2">
                  <div className="flex-1">
                    <label className="block text-[10px] font-semibold text-white/60 mb-1.5 uppercase tracking-wider ml-1">Tempo da Dica</label>
                    <select disabled={!isHost} value={room.settings.hintTime || 15} onChange={e => updateSetting('hintTime', parseInt(e.target.value))} className="w-full glass-input rounded-xl px-4 py-3.5 text-sm text-center font-medium disabled:opacity-50">
                      <option value={10}>10s</option>
                      <option value={15}>15s</option>
                      <option value={20}>20s</option>
                      <option value={30}>30s</option>
                    </select>
                  </div>
                  <div className="flex-1">
                    <label className="block text-[10px] font-semibold text-white/60 mb-1.5 uppercase tracking-wider ml-1">Tempo p/ Votar</label>
                    <select disabled={!isHost} value={room.settings.voteTime || 60} onChange={e => updateSetting('voteTime', parseInt(e.target.value))} className="w-full glass-input rounded-xl px-4 py-3.5 text-sm text-center font-medium disabled:opacity-50">
                      <option value={30}>30s</option>
                      <option value={45}>45s</option>
                      <option value={60}>60s</option>
                      <option value={90}>90s</option>
                    </select>
                  </div>
                </div>
              </div>

              <div className="mt-8">
                {isHost ? (
                  <button onClick={startGame} disabled={isStartingGame} className={`w-full btn-gradient py-4 rounded-full font-bold text-lg flex justify-center items-center gap-2 disabled:opacity-70`}>
                    {isStartingGame ? <><i className="ph-bold ph-spinner animate-spin"></i> Preparando...</> : <><i className="ph-bold ph-play"></i> Iniciar Jogo</>}
                  </button>
                ) : (
                  <div className="w-full bg-white/5 border border-white/10 text-white/50 font-medium py-4 rounded-full text-center text-sm flex items-center justify-center gap-2">
                    <i className="ph-bold ph-hourglass-medium"></i> Aguardando o líder
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function HintingScreen({ room, user, submitHint, categoryTheme }) {
      const state = room.gameState;
      const isImpostor = state.impostorIds.includes(user.uid);
      const isMyTurn = state.turnOrder[state.currentTurnIndex] === user.uid;
      const [hintInput, setHintInput] = useState('');
      const [timeLeft, setTimeLeft] = useState(room.settings.hintTime);

      const themeName = room.settings.categoryPreset;

      useEffect(() => {
        const int = setInterval(() => setTimeLeft(Math.max(0, Math.ceil((state.turnDeadline - Date.now()) / 1000))), 500);
        return () => clearInterval(int);
      }, [state.turnDeadline]);

      return (
        <div className="flex-1 flex flex-col relative animate-in zoom-in-95 duration-500">
          <div className="pt-2 pb-6 text-center relative z-10 flex flex-col items-center justify-center min-h-[180px]">
            {isImpostor ? (
              <div className="animate-in slide-in-from-top-4 flex flex-col items-center w-full">
                <div className="w-20 h-20 rounded-3xl bg-black/40 border border-white/10 flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(var(--color-accent),0.3)]">
                    <i className="ph-fill ph-mask-happy text-[var(--color-accent)] text-[40px]"></i>
                </div>
                <div className="text-3xl font-black uppercase tracking-widest text-white drop-shadow-md">IMPOSTOR!</div>
                <div className="mt-3 bg-white/10 backdrop-blur-md px-6 py-2.5 rounded-full border border-white/10 flex items-center gap-2">
                  <span className="text-[10px] font-semibold uppercase tracking-wider opacity-60">Tema:</span>
                  <span className="text-sm font-bold uppercase text-[var(--color-accent)]">{themeName}</span>
                </div>
              </div>
            ) : (
              <div className="animate-in slide-in-from-top-4 w-full flex flex-col items-center">
                <div className="bg-white/10 backdrop-blur-sm border border-white/10 px-4 py-1.5 rounded-full mb-4">
                  <p className="text-[10px] font-semibold uppercase tracking-widest">TEMA: <span className="text-[var(--color-accent)]">{themeName}</span></p>
                </div>
                <p className="font-medium uppercase tracking-widest mb-1 text-xs text-white/60">A PALAVRA É</p>
                <div className="text-4xl sm:text-5xl font-black uppercase tracking-tight text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] text-center px-4">
                  {state.word}
                </div>
              </div>
            )}
          </div>

          <div className="glass-card flex-1 p-6 flex flex-col pb-8 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[var(--color-glow-1)] to-transparent opacity-50"></div>
            
            <div className="flex justify-between items-center mb-6">
              <h3 className="font-bold text-lg flex items-center gap-2">
                Rodada <span className="text-[var(--color-accent)]">{state.currentRound}</span><span className="text-white/30 text-sm">/ {state.totalRounds}</span>
              </h3>
              <div className={`px-4 py-1.5 rounded-full font-mono font-bold text-sm border ${timeLeft <= 5 ? 'border-red-500/50 bg-red-500/20 text-red-300 animate-pulse' : 'border-white/10 bg-black/20'}`}>
                 00:{timeLeft.toString().padStart(2, '0')}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-20 relative">
               <div className="absolute left-[27px] top-4 bottom-4 w-0.5 bg-white/5 rounded-full z-0"></div>

              {state.turnOrder.map((uid, idx) => {
                const player = room.players[uid];
                const isThisTurn = idx === state.currentTurnIndex;
                const hasPlayed = idx < state.currentTurnIndex;
                const pastHints = state.allHints?.[uid] || [];
                
                return (
                  <div key={uid} className={`relative p-4 rounded-2xl transition-all z-10 flex items-center gap-4 ${isThisTurn ? 'bg-white/10 border border-white/20 shadow-lg scale-[1.02]' : 'bg-transparent border border-transparent'}`}>
                    
                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-bold text-white text-xl shrink-0 transition-all ${isThisTurn ? 'bg-gradient-to-br from-[var(--color-glow-1)] to-[var(--color-glow-2)] shadow-lg' : hasPlayed ? 'bg-white/5 border border-white/10 text-white/50' : 'bg-black/20 border border-white/5 text-white/30'}`}>
                      {player?.isBot ? <i className="ph-fill ph-robot"></i> : player?.name?.charAt(0).toUpperCase()}
                    </div>
                    
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-xs text-white/60 flex items-center gap-2">
                          {player?.name}
                      </div>
                      
                      {hasPlayed && state.hints[uid] ? (
                        <div className="text-white font-medium text-lg leading-tight mt-0.5">"{state.hints[uid]}"</div>
                      ) : isThisTurn ? (
                        <div className="text-[var(--color-accent)] font-semibold text-sm mt-0.5 flex items-center gap-2">Pensando <span className="flex gap-0.5"><span className="animate-bounce">.</span><span className="animate-bounce delay-100">.</span><span className="animate-bounce delay-200">.</span></span></div>
                      ) : (
                        <div className="text-white/30 font-medium text-sm mt-0.5">Aguardando</div>
                      )}
                    </div>
                    {hasPlayed && <div className="text-emerald-400 mr-2 bg-emerald-400/10 p-1.5 rounded-full"><i className="ph-bold ph-check"></i></div>}
                  </div>
                );
              })}
            </div>

            {isMyTurn && (
              <div className="absolute bottom-6 left-6 right-6 animate-in slide-in-from-bottom-4">
                <form onSubmit={e => { e.preventDefault(); submitHint(hintInput); setHintInput(''); }} className="bg-black/60 backdrop-blur-xl p-2 rounded-full border border-white/20 shadow-2xl flex gap-2">
                  <input type="text" autoFocus value={hintInput} onChange={e => setHintInput(e.target.value)} placeholder="Escreva sua dica..." className="flex-1 bg-transparent px-5 text-white font-medium focus:outline-none placeholder-white/30" maxLength={40} />
                  <button type="submit" disabled={!hintInput.trim()} className="btn-gradient text-white font-bold w-12 h-12 rounded-full flex items-center justify-center shrink-0 disabled:opacity-50">
                    <i className="ph-bold ph-paper-plane-right text-xl"></i>
                  </button>
                </form>
              </div>
            )}
          </div>
        </div>
      );
    }

    // NOVA TELA DE REVISÃO (DOSSIÊ DOS JOGADORES) COM HISTÓRICO E ANIMAÇÕES
    function ReviewScreen({ room }) {
      const state = room.gameState;
      const [timeLeft, setTimeLeft] = useState(10);
      const themeName = room.settings.categoryPreset;
      const isLastRound = state.currentRound === state.totalRounds;
      
      useEffect(() => {
        const int = setInterval(() => setTimeLeft(Math.max(0, Math.ceil((state.phaseDeadline - Date.now()) / 1000))), 500);
        return () => clearInterval(int);
      }, [state.phaseDeadline]);

      return (
        <div className="flex-1 flex flex-col relative animate-in slide-in-from-bottom-8 duration-500">
          <div className="pt-6 pb-6 text-center relative z-10 flex flex-col items-center">
            <h2 className="text-sm font-bold uppercase tracking-widest text-[var(--color-accent)] mb-1">
               {isLastRound ? 'Fim das Rodadas' : 'Revisão Rápida'}
            </h2>
            <div className={`text-4xl font-black font-mono tracking-tighter drop-shadow-md text-white mb-2`}>
              00:{timeLeft.toString().padStart(2, '0')}
            </div>
            <p className="text-white/50 text-[11px] font-semibold uppercase tracking-widest">
               {isLastRound ? 'Preparando votação...' : 'Aguardando próxima rodada...'}
            </p>
          </div>

          <div className="glass-card flex-1 w-full p-6 relative flex flex-col overflow-hidden">
            <div className="flex items-center gap-2 mb-4">
                <i className="ph-fill ph-eye text-[var(--color-accent)] text-xl animate-pulse"></i>
                <h3 className="font-semibold text-white/50 text-xs uppercase tracking-widest">
                   Dossiê dos Jogadores
                </h3>
            </div>
            
            <div className="grid gap-4 overflow-y-auto no-scrollbar pb-10 pr-2">
              {state.turnOrder.map((uid, index) => {
                const player = room.players[uid];
                // Pega TODAS as dicas do jogador até agora (R1, R2, etc)
                const pastHints = state.allHints?.[uid] || [];
                
                // Animação em cascata para cada card de jogador
                const delay = index * 300; 

                return (
                  <div 
                    key={uid} 
                    className="bg-black/40 p-5 rounded-3xl border border-white/10 flex flex-col shadow-lg relative overflow-hidden group"
                    style={{ 
                        animation: `slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards`,
                        animationDelay: `${delay}ms`,
                        opacity: 0,
                        transform: 'translateY(20px)'
                    }}
                  >
                    {/* Detalhe visual na borda esquerda do card */}
                    <div className="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-[var(--color-glow-1)] to-[var(--color-glow-2)]"></div>

                    <div className="font-bold text-white text-sm mb-3 flex items-center gap-2">
                        <div className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-xs border border-white/5 shadow-inner">
                            {player.isBot ? <i className="ph-fill ph-robot"></i> : player.name.charAt(0).toUpperCase()}
                        </div>
                        {player.name}
                    </div>

                    <div className="flex flex-col gap-2 pl-2">
                        {pastHints.map((hint, hIndex) => (
                             <div 
                                key={hIndex} 
                                className="flex items-start gap-3"
                                style={{
                                    animation: `fadeInLeft 0.5s ease forwards`,
                                    animationDelay: `${delay + 300 + (hIndex * 200)}ms`,
                                    opacity: 0,
                                    transform: 'translateX(-15px)'
                                }}
                             >
                                <span className="mt-0.5 text-[10px] font-black uppercase text-[var(--color-accent)] bg-[var(--color-accent)]/10 px-2 py-0.5 rounded-md border border-[var(--color-accent)]/20 shrink-0 shadow-[0_0_10px_rgba(var(--color-accent),0.2)]">
                                    R{hIndex + 1}
                                </span>
                                <span className="text-white/90 font-medium text-base leading-tight">
                                    "{hint}"
                                </span>
                             </div>
                        ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function VotingScreen({ room, user, submitVote }) {
      const state = room.gameState;
      const myVote = state.votes[user.uid];
      const [timeLeft, setTimeLeft] = useState(room.settings.voteTime || 60);

      useEffect(() => {
        if (!state.voteDeadline) return;
        const int = setInterval(() => setTimeLeft(Math.max(0, Math.ceil((state.voteDeadline - Date.now()) / 1000))), 1000);
        return () => clearInterval(int);
      }, [state.voteDeadline]);

      return (
        <div className="flex-1 flex flex-col relative animate-in zoom-in duration-300">
          <div className="pt-6 pb-6 px-6 text-center text-white relative z-10">
             <div className="flex justify-between items-center mb-2">
               <div className="inline-flex items-center justify-center w-12 h-12 rounded-full bg-red-500/20 border border-red-500/50 shadow-[0_0_30px_rgba(239,68,68,0.3)] mx-auto">
                  <i className="ph-fill ph-crosshair text-red-400 text-2xl"></i>
               </div>
             </div>
             <h2 className="text-2xl font-bold tracking-tight">Votação</h2>
             <p className="text-white/60 text-sm font-medium mt-1">Quem é o Impostor?</p>
             
             <div className={`mt-3 inline-block px-4 py-1.5 rounded-full font-mono font-bold text-sm border ${timeLeft <= 10 ? 'border-red-500/50 bg-red-500/20 text-red-300 animate-pulse' : 'border-white/10 bg-black/20'}`}>
                 00:{timeLeft.toString().padStart(2, '0')}
             </div>
          </div>

          <div className="glass-card flex-1 w-full p-6 relative pb-10 overflow-y-auto no-scrollbar">
            <div className="grid grid-cols-2 gap-4">
              {Object.entries(room.players).map(([uid, player]) => {
                const isSelected = myVote === uid;
                const isMe = uid === user.uid;
                
                return (
                  <button key={uid} disabled={isMe || myVote} onClick={() => submitVote(uid)} className={`relative p-5 rounded-3xl text-center transition-all duration-300 border flex flex-col items-center gap-3 ${isMe ? 'opacity-30 border-white/5 bg-black/20 cursor-not-allowed' : ''} ${!isMe && !myVote ? 'bg-white/5 border-white/10 hover:border-white/30 hover:bg-white/10' : ''} ${isSelected ? 'bg-[var(--color-accent)]/20 border-[var(--color-accent)] shadow-[0_0_20px_rgba(var(--color-accent),0.4)] transform scale-105' : ''} ${myVote && !isSelected && !isMe ? 'opacity-30 border-white/5 bg-transparent' : ''}`}>
                    
                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center font-bold text-white text-2xl transition-colors ${isSelected ? 'bg-[var(--color-accent)] shadow-lg' : 'bg-white/10'}`}>
                      {player.isBot ? <i className="ph-fill ph-robot"></i> : player.name.charAt(0).toUpperCase()}
                    </div>
                    <div>
                      <div className={`font-semibold text-sm ${isSelected ? 'text-white' : 'text-white/80'}`}>{player.name}</div>
                      {isMe && <div className="text-[9px] text-white/40 font-bold uppercase tracking-widest mt-1">Você</div>}
                    </div>
                    {isSelected && <div className="absolute -top-2 -right-2 bg-[var(--color-accent)] text-white w-8 h-8 flex items-center justify-center rounded-full border-2 border-[#09090b] shadow-lg"><i className="ph-bold ph-check text-lg"></i></div>}
                  </button>
                );
              })}
            </div>
            
            {myVote && (
               <div className="mt-8 text-center bg-white/5 border border-white/10 py-4 rounded-2xl font-medium text-sm text-white/60 flex items-center justify-center gap-2">
                  <i className="ph-bold ph-circle-notch animate-spin text-[var(--color-accent)] text-xl"></i> Aguardando votos...
               </div>
            )}
          </div>
        </div>
      );
    }

    function ResultScreen({ room, isHost, restartGame }) {
      const state = room.gameState;
      const voteCounts = Object.values(state.votes).reduce((acc, uid) => { acc[uid] = (acc[uid] || 0) + 1; return acc; }, {});
      const maxVotes = Math.max(...Object.values(voteCounts), 0);
      const mostVotedUids = Object.keys(voteCounts).filter(uid => voteCounts[uid] === maxVotes);
      
      const impostorCaught = mostVotedUids.some(uid => state.impostorIds.includes(uid));

      const bgGlow = impostorCaught ? 'radial-gradient(circle at center, rgba(52,211,153,0.15) 0%, transparent 70%)' : 'radial-gradient(circle at center, rgba(248,113,113,0.15) 0%, transparent 70%)';
      const accentColor = impostorCaught ? 'text-emerald-400' : 'text-red-400';
      const borderGlow = impostorCaught ? 'border-emerald-500/50 shadow-[0_0_30px_rgba(52,211,153,0.2)]' : 'border-red-500/50 shadow-[0_0_30px_rgba(248,113,113,0.2)]';

      return (
        <div className="flex-1 flex flex-col relative animate-in zoom-in-95 duration-700 overflow-hidden" style={{ backgroundImage: bgGlow }}>
          
          {impostorCaught && (
            <div className="absolute inset-0 pointer-events-none z-0 overflow-hidden">
              {[...Array(30)].map((_, i) => (
                <div key={i} className="confetti" style={{
                  left: `${Math.random() * 100}%`,
                  animationDelay: `${Math.random() * 3}s`,
                  backgroundColor: ['#34d399', '#6366f1', '#f97316', '#ffffff'][Math.floor(Math.random() * 4)]
                }}></div>
              ))}
            </div>
          )}

          <div className="pt-12 pb-10 px-6 text-center relative z-10 flex flex-col items-center">
            <div className="text-white/50 font-bold uppercase tracking-widest text-xs mb-6">
              {state.impostorIds.length > 1 ? 'OS IMPOSTORES ERAM' : 'O IMPOSTOR ERA'}
            </div>
            
            <div className="flex flex-col gap-4 mb-10 w-full max-w-[280px]">
               {state.impostorIds.map(id => (
                   <div key={id} className={`text-2xl font-bold bg-white/10 backdrop-blur-md px-6 py-4 rounded-3xl border flex items-center justify-center gap-3 ${borderGlow}`}>
                      <i className={`ph-fill ${impostorCaught ? 'ph-mask-sad opacity-50' : 'ph-mask-happy'} ${accentColor}`}></i> {room.players[id]?.name}
                   </div>
               ))}
            </div>
            
            <div className="flex flex-col items-center gap-1 bg-black/40 border border-white/10 px-8 py-4 rounded-[2rem] shadow-inner">
              <span className="text-[10px] uppercase tracking-widest text-white/40 font-bold">A Palavra era</span>
              <span className="font-black text-2xl text-white tracking-tight text-center">{state.word}</span>
            </div>
          </div>

          <div className="glass-card flex-1 w-full p-6 relative pb-10 flex flex-col z-10">
            
            <div className={`-mt-12 mx-auto inline-flex items-center gap-2 px-8 py-3 rounded-full text-center font-bold uppercase tracking-widest text-white border shadow-lg z-20 ${impostorCaught ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-100' : 'bg-red-500/20 border-red-500/50 text-red-100'}`}>
               {impostorCaught ? <><i className="ph-fill ph-trophy text-emerald-400 text-lg"></i> Grupo Venceu</> : <><i className="ph-fill ph-skull text-red-400 text-lg"></i> Impostor Venceu</>}
            </div>

            <div className="mt-8 space-y-3 mb-auto">
              <h3 className="font-bold text-white/40 uppercase tracking-widest text-[10px] mb-4 text-center">Urnas de Votação</h3>
              {Object.entries(room.players).map(([uid, player]) => {
                const isImpostor = state.impostorIds.includes(uid);
                const v = voteCounts[uid] || 0;
                if (v === 0 && !isImpostor) return null;
                
                return (
                  <div key={uid} className="bg-black/20 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div className="font-medium text-white/80 text-sm flex items-center gap-2">
                       {player.name} 
                       {isImpostor && <i className={`ph-fill ph-warning ${accentColor} text-lg`}></i>}
                    </div>
                    <div className="flex gap-1.5 flex-wrap justify-end">
                      {Array.from({length: v}).map((_, i) => (
                         <div key={i} className="w-3 h-3 rounded-full bg-white/80 shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>

            {isHost && (
               <button onClick={restartGame} className="mt-10 w-full btn-gradient py-4 rounded-full font-bold text-lg flex justify-center items-center gap-2 shadow-xl">
                 <i className="ph-bold ph-arrow-counter-clockwise text-xl"></i> Jogar Novamente
               </button>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
