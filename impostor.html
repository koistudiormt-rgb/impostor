<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Infiltrado</title>

  <!-- Tailwind CSS para Estilização -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Phosphor Icons para os Ícones Visuais -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- React & ReactDOM (Versões Standalone) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para compilar o código React dentro do navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase (Versão Compatível Standalone para não gerar erro de CORS em arquivos locais) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    /* Suaviza a rolagem e remove marcações nativas do navegador */
    body { 
      -webkit-font-smoothing: antialiased; 
      background-color: #f1f5f9; /* Fundo suave para fora do app no desktop */
    }
    /* Esconde barra de rolagem mas permite rolar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-slate-800 font-sans selection:bg-fuchsia-500 selection:text-white">
  
  <div id="root"></div>

  <!-- Lógica Principal da Aplicação React -->
  <script type="text/babel" data-presets="react">

    // ==========================================================
    // 1. CONFIGURAÇÃO DO BANCO DE DADOS FIREBASE
    // ==========================================================
    const envConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
    
    const myLocalConfig = {
      apiKey: "",
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: ""
    };

    const firebaseConfig = envConfig || myLocalConfig;
    const isConfigValid = firebaseConfig && firebaseConfig.apiKey !== "";

    if (isConfigValid && !firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = isConfigValid ? firebase.auth() : null;
    const db = isConfigValid ? firebase.firestore() : null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'impostor-game-local';

    const getRoomRef = (roomId) => {
        return db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId);
    };

    // ==========================================================
    // 2. DICIONÁRIO DE TEMAS
    // ==========================================================
    const DICTIONARY = {
      "Animais": ["Leão", "Elefante", "Girafa", "Pinguim", "Tubarão", "Urso", "Macaco", "Cachorro", "Gato", "Cobra", "Jacaré", "Baleia", "Coruja", "Lobo"],
      "Comida": ["Pizza", "Hambúrguer", "Sushi", "Lasanha", "Sorvete", "Bolo", "Salada", "Churrasco", "Sopa", "Tacos", "Macarrão", "Coxinha", "Pão de Queijo"],
      "Profissões": ["Médico", "Professor", "Bombeiro", "Policial", "Engenheiro", "Cozinheiro", "Astronauta", "Pintor", "Músico", "Atleta", "Advogado", "Piloto", "Detetive"],
      "Lugares": ["Praia", "Montanha", "Escola", "Hospital", "Supermercado", "Cinema", "Parque", "Biblioteca", "Aeroporto", "Estádio", "Museu", "Zoológico", "Fazenda"],
      "Filmes e Séries": ["Harry Potter", "Star Wars", "Vingadores", "Matrix", "O Senhor dos Anéis", "Stranger Things", "Game of Thrones", "Jurassic Park", "Batman", "Homem-Aranha"]
    };

    const generateRoomCode = () => Math.random().toString(36).substring(2, 6).toUpperCase();

    const { useState, useEffect, useRef } = React;

    // ==========================================================
    // 3. APLICATIVO PRINCIPAL (APP)
    // ==========================================================
    function App() {
      if (!isConfigValid) {
        return (
          <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 text-center text-white font-sans">
            <i className="ph-fill ph-warning-circle text-6xl text-amber-500 mb-4 animate-bounce"></i>
            <h1 className="text-3xl font-black mb-3">Banco de Dados Ausente</h1>
            <p className="text-slate-400 max-w-lg mb-6">
              Para jogar offline no seu computador conectando seus amigos via internet, é necessário inserir as chaves de um projeto do Firebase no código-fonte deste HTML.
            </p>
          </div>
        );
      }

      const [user, setUser] = useState(null);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [playerName, setPlayerName] = useState('');
      const [roomCodeInput, setRoomCodeInput] = useState('');
      const [room, setRoom] = useState(null);
      const [currentRoomId, setCurrentRoomId] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (err) {
            setErrorMsg("Erro ao conectar aos servidores.");
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((u) => {
          setUser(u);
          setLoadingAuth(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !currentRoomId) return;

        const roomRef = getRoomRef(currentRoomId);
        const unsubscribe = roomRef.onSnapshot((snapshot) => {
          if (snapshot.exists) {
            setRoom(snapshot.data());
          } else {
            setRoom(null);
            setCurrentRoomId(null);
            setErrorMsg("A sala foi fechada ou não existe.");
          }
        }, () => {
          setErrorMsg("Conexão perdida com a sala.");
        });

        return () => unsubscribe();
      }, [user, currentRoomId]);

      useEffect(() => {
        if (!user || !room || room.hostId !== user.uid) return;

        const interval = setInterval(async () => {
          const now = Date.now();
          const state = room.gameState;

          if (room.status === 'hinting' && state?.turnDeadline) {
            if (now >= state.turnDeadline) {
              await advanceTurn(room, state);
            }
          } else if (room.status === 'discussing' && state?.phaseDeadline) {
            if (now >= state.phaseDeadline) {
              const roomRef = getRoomRef(room.id);
              await roomRef.update({ status: 'voting' });
            }
          }
        }, 1000);

        return () => clearInterval(interval);
      }, [room, user]);

      const handleCreateRoom = async () => {
        if (!playerName.trim()) return setErrorMsg("Digite seu nome primeiro!");
        
        const newRoomId = generateRoomCode();
        const roomRef = getRoomRef(newRoomId);
        
        const initialData = {
          id: newRoomId, hostId: user.uid, status: 'lobby',
          settings: { category: Object.keys(DICTIONARY)[0], hintTime: 15, discussTime: 180 },
          players: { [user.uid]: { name: playerName, isHost: true } },
          gameState: null
        };

        try {
          await roomRef.set(initialData);
          setCurrentRoomId(newRoomId);
          setErrorMsg('');
        } catch (err) {
          setErrorMsg("Erro ao criar sala.");
        }
      };

      const handleJoinRoom = async (e) => {
        e.preventDefault();
        if (!playerName.trim()) return setErrorMsg("Digite seu nome primeiro!");
        if (!roomCodeInput.trim()) return setErrorMsg("Digite o código da sala!");
        
        const code = roomCodeInput.trim().toUpperCase();
        const roomRef = getRoomRef(code);
        
        try {
          const docSnap = await roomRef.get();
          if (!docSnap.exists) return setErrorMsg("Sala não encontrada.");
          
          const roomData = docSnap.data();
          if (roomData.status !== 'lobby') return setErrorMsg("O jogo já começou nesta sala.");

          const updatedPlayers = { ...roomData.players };
          updatedPlayers[user.uid] = { name: playerName, isHost: false };
          
          await roomRef.update({ players: updatedPlayers });
          setCurrentRoomId(code);
          setErrorMsg('');
        } catch (err) {
          setErrorMsg("Erro ao entrar na sala.");
        }
      };

      const leaveRoom = async () => {
        if (room && room.players[user.uid]) {
          const roomRef = getRoomRef(room.id);
          const updatedPlayers = { ...room.players };
          delete updatedPlayers[user.uid];
          
          if (Object.keys(updatedPlayers).length === 0) {
            await roomRef.delete();
          } else {
            let newHostId = room.hostId;
            if (room.hostId === user.uid) {
              newHostId = Object.keys(updatedPlayers)[0];
              updatedPlayers[newHostId].isHost = true;
            }
            await roomRef.update({ players: updatedPlayers, hostId: newHostId });
          }
        }
        setCurrentRoomId(null);
        setRoom(null);
      };

      const startGame = async () => {
        const playerIds = Object.keys(room.players);
        if (playerIds.length < 3) return setErrorMsg("Mínimo de 3 jogadores para iniciar.");

        const category = room.settings.category;
        const words = DICTIONARY[category];
        const secretWord = words[Math.floor(Math.random() * words.length)];
        
        const impostorId = playerIds[Math.floor(Math.random() * playerIds.length)];
        const turnOrder = [...playerIds].sort(() => Math.random() - 0.5);

        const roomRef = getRoomRef(room.id);
        await roomRef.update({
          status: 'hinting',
          gameState: {
            word: secretWord, impostorId: impostorId, turnOrder: turnOrder,
            currentTurnIndex: 0, turnDeadline: Date.now() + (room.settings.hintTime * 1000),
            hints: {}, votes: {}
          }
        });
        setErrorMsg('');
      };

      const advanceTurn = async (currentRoom, state) => {
        const roomRef = getRoomRef(currentRoom.id);
        const nextIndex = state.currentTurnIndex + 1;
        
        if (nextIndex >= state.turnOrder.length) {
          await roomRef.update({
            status: 'discussing',
            'gameState.currentTurnIndex': nextIndex,
            'gameState.phaseDeadline': Date.now() + (currentRoom.settings.discussTime * 1000)
          });
        } else {
          await roomRef.update({
            'gameState.currentTurnIndex': nextIndex,
            'gameState.turnDeadline': Date.now() + (currentRoom.settings.hintTime * 1000)
          });
        }
      };

      const submitHint = async (hint) => {
        if (!hint.trim()) return;
        const roomRef = getRoomRef(room.id);
        const updatedHints = { ...room.gameState.hints, [user.uid]: hint };
        
        await roomRef.update({ 'gameState.hints': updatedHints });
        const state = { ...room.gameState, hints: updatedHints };
        await advanceTurn(room, state);
      };

      const submitVote = async (targetUid) => {
        const roomRef = getRoomRef(room.id);
        const updatedVotes = { ...room.gameState.votes, [user.uid]: targetUid };
        
        await roomRef.update({ 'gameState.votes': updatedVotes });

        if (Object.keys(updatedVotes).length === Object.keys(room.players).length) {
          await roomRef.update({ status: 'finished' });
        }
      };

      const restartGame = async () => {
        const roomRef = getRoomRef(room.id);
        await roomRef.update({ status: 'lobby', gameState: null });
      };

      const updateSetting = async (key, value) => {
        const roomRef = getRoomRef(room.id);
        await roomRef.update({ [`settings.${key}`]: value });
      };

      if (loadingAuth) {
        return <div className="min-h-screen flex items-center justify-center text-fuchsia-500"><i className="ph ph-spinner-gap text-5xl animate-spin"></i></div>;
      }

      // BACKGROUND DINÂMICO BASEADO NO STATUS DO JOGO
      let bgGradient = "from-violet-500 to-fuchsia-500";
      if (room?.status === 'discussing') bgGradient = "from-orange-500 to-rose-500";
      if (room?.status === 'voting') bgGradient = "from-indigo-600 to-blue-500";
      if (room?.status === 'finished') bgGradient = "from-emerald-400 to-teal-600";
      if (room?.status === 'hinting') {
          bgGradient = room.gameState.impostorId === user?.uid 
            ? "from-red-500 to-orange-500" 
            : "from-emerald-400 to-cyan-500";
      }

      return (
        <div className={`max-w-[480px] mx-auto min-h-screen sm:min-h-[90vh] sm:my-8 sm:rounded-[3rem] bg-gradient-to-br ${bgGradient} shadow-2xl relative flex flex-col overflow-hidden transition-colors duration-700`}>
          
          {/* Header Superior - Sempre vísivel com fundo transparente */}
          <header className="px-6 py-5 flex justify-between items-center relative z-20 text-white">
            <div className="flex items-center gap-2 font-black text-xl tracking-tight">
              <div className="bg-white/20 p-2 rounded-xl backdrop-blur-md">
                <i className="ph-bold ph-ghost text-white text-2xl"></i>
              </div>
              <span>INFILTRADO</span>
            </div>
            {room && (
              <button onClick={leaveRoom} className="flex items-center gap-2 text-sm text-white/80 hover:text-white bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full backdrop-blur-md transition-all">
                <i className="ph-bold ph-sign-out"></i> Sair
              </button>
            )}
          </header>

          {/* Toast de Erro Flutuante */}
          {errorMsg && (
            <div className="absolute top-20 left-1/2 -translate-x-1/2 w-[90%] bg-red-500 text-white px-6 py-4 rounded-2xl flex items-center gap-3 shadow-xl z-50 animate-in slide-in-from-top-4">
              <i className="ph-fill ph-warning-circle text-2xl"></i>
              <p className="font-medium text-sm">{errorMsg}</p>
              <button onClick={() => setErrorMsg('')} className="ml-auto"><i className="ph-bold ph-x"></i></button>
            </div>
          )}

          {/* Área Principal - Onde as telas são renderizadas */}
          {!currentRoomId || !room ? (
            <HomeScreen playerName={playerName} setPlayerName={setPlayerName} roomCodeInput={roomCodeInput} setRoomCodeInput={setRoomCodeInput} handleCreateRoom={handleCreateRoom} handleJoinRoom={handleJoinRoom} />
          ) : (
            <GameContainer room={room} user={user} startGame={startGame} submitHint={submitHint} submitVote={submitVote} restartGame={restartGame} updateSetting={updateSetting} />
          )}

        </div>
      );
    }

    // ==========================================================
    // TELAS DO JOGO COM O NOVO DESIGN SYSTEM
    // ==========================================================

    function HomeScreen({ playerName, setPlayerName, roomCodeInput, setRoomCodeInput, handleCreateRoom, handleJoinRoom }) {
      return (
        <div className="flex-1 flex flex-col relative animate-in fade-in duration-500">
          
          {/* Área Superior com Ícone Grande */}
          <div className="h-48 flex items-center justify-center relative z-0">
            <div className="relative">
              <div className="absolute inset-0 bg-white/20 blur-2xl rounded-full scale-150"></div>
              <i className="ph-fill ph-detective text-[120px] text-white drop-shadow-2xl animate-bounce relative z-10"></i>
            </div>
          </div>

          {/* Container Branco Arredondado - Estilo Card Premium */}
          <div className="bg-slate-50 rounded-t-[2.5rem] flex-1 w-full p-8 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] relative z-10 flex flex-col gap-6 -mt-6">
            <div className="text-center mb-2">
              <h1 className="text-3xl font-black text-slate-800 tracking-tight">Crie sua Sala</h1>
              <p className="text-slate-500 mt-2 text-sm leading-relaxed">Prepare-se para enganar seus amigos ou bancar o detetive.</p>
            </div>

            <div className="space-y-6">
              <div>
                <label className="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider ml-2">Seu Apelido</label>
                <input 
                  type="text" 
                  value={playerName} 
                  onChange={e => setPlayerName(e.target.value)} 
                  placeholder="Ex: Joãozinho" 
                  className="w-full bg-white border-2 border-slate-100 rounded-full px-6 py-4 text-slate-800 font-bold shadow-sm focus:outline-none focus:border-fuchsia-300 focus:ring-4 focus:ring-fuchsia-100 transition-all placeholder-slate-300" 
                  maxLength={15} 
                />
              </div>

              <button 
                onClick={handleCreateRoom} 
                className="w-full bg-gradient-to-r from-fuchsia-500 to-orange-400 text-white font-black py-4 px-6 rounded-full shadow-[0_10px_25px_rgba(217,70,239,0.3)] transform hover:-translate-y-1 transition-all flex justify-center items-center gap-2 text-lg"
              >
                <i className="ph-bold ph-plus-circle text-xl"></i> Criar Nova Sala
              </button>

              <div className="relative flex items-center py-2">
                <div className="flex-grow border-t border-slate-200"></div>
                <span className="flex-shrink-0 mx-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Ou entre em uma</span>
                <div className="flex-grow border-t border-slate-200"></div>
              </div>

              <form onSubmit={handleJoinRoom} className="space-y-4">
                <input 
                  type="text" 
                  value={roomCodeInput} 
                  onChange={e => setRoomCodeInput(e.target.value.toUpperCase())} 
                  placeholder="CÓDIGO DA SALA" 
                  className="w-full bg-white border-2 border-slate-100 rounded-full px-6 py-4 text-slate-800 text-center font-mono font-black text-xl tracking-widest shadow-sm focus:outline-none focus:border-violet-300 focus:ring-4 focus:ring-violet-100 transition-all placeholder-slate-300 uppercase" 
                  maxLength={4} 
                />
                <button 
                  type="submit" 
                  className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 px-6 rounded-full shadow-[0_10px_25px_rgba(30,41,59,0.2)] transition-all transform hover:-translate-y-1"
                >
                  Entrar na Sala
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    function GameContainer(props) {
      switch (props.room.status) {
        case 'lobby': return <LobbyScreen {...props} isHost={props.room.hostId === props.user.uid} />;
        case 'hinting': return <HintingScreen {...props} />;
        case 'discussing': return <DiscussingScreen {...props} />;
        case 'voting': return <VotingScreen {...props} />;
        case 'finished': return <ResultScreen {...props} isHost={props.room.hostId === props.user.uid} />;
        default: return <div>Estado desconhecido.</div>;
      }
    }

    function LobbyScreen({ room, isHost, startGame, updateSetting, user }) {
      const players = Object.entries(room.players);
      return (
        <div className="flex-1 flex flex-col relative animate-in slide-in-from-right duration-300">
          
          {/* Código da Sala em Destaque */}
          <div className="pt-2 pb-10 px-8 text-center text-white relative z-0">
            <p className="text-white/70 text-sm uppercase tracking-widest font-bold mb-1">Código da Sala</p>
            <div className="text-6xl font-black font-mono tracking-widest drop-shadow-xl select-all cursor-pointer">
              {room.id}
            </div>
          </div>

          {/* Container Branco Principal */}
          <div className="bg-slate-50 rounded-t-[2.5rem] flex-1 w-full p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] relative z-10 flex flex-col pb-8">
            
            {/* Botão Flutuante Iniciar Jogo (Se for Host) */}
            {isHost ? (
               <button 
                onClick={startGame} 
                className="absolute -top-8 right-8 bg-gradient-to-r from-orange-400 to-rose-400 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(2fb,113,133,0.5)] transform hover:scale-110 transition-all z-20"
                title="Iniciar Jogo"
              >
                <i className="ph-fill ph-play text-3xl ml-1"></i>
              </button>
            ) : (
              <div className="absolute -top-6 right-8 bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg animate-pulse z-20">
                Aguardando host...
              </div>
            )}

            <div className="flex items-center justify-between mb-6 mt-4">
              <h3 className="font-black text-xl text-slate-800 flex items-center gap-2">
                Jogadores <span className="bg-violet-100 text-violet-600 px-3 py-1 rounded-full text-sm">{players.length}</span>
              </h3>
            </div>
            
            {/* Grid de Jogadores */}
            <div className="grid grid-cols-2 gap-3 mb-8">
              {players.map(([uid, p]) => (
                <div key={uid} className={`bg-white p-3 rounded-2xl flex items-center gap-3 shadow-sm border ${uid === user.uid ? 'border-violet-200' : 'border-slate-100'}`}>
                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-white text-lg ${p.isHost ? 'bg-gradient-to-br from-amber-400 to-orange-500' : 'bg-gradient-to-br from-violet-400 to-fuchsia-500'}`}>
                    {p.name.charAt(0).toUpperCase()}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold text-slate-700 text-sm truncate">{p.name}</div>
                    {p.isHost && <div className="text-[10px] text-amber-500 font-bold uppercase tracking-wider">Host</div>}
                  </div>
                </div>
              ))}
            </div>

            {/* Configurações (Apenas visualização elegante para quem não é host) */}
            <div className="mt-auto bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
              <h3 className="font-bold text-sm text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <i className="ph-fill ph-sliders"></i> Regras da Partida
              </h3>
              
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-1">Tema</label>
                  <select disabled={!isHost} value={room.settings.category} onChange={e => updateSetting('category', e.target.value)} className="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-slate-800 font-bold focus:ring-2 focus:ring-violet-200 disabled:opacity-80 appearance-none">
                    {Object.keys(DICTIONARY).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                  </select>
                </div>
                
                <div className="flex gap-4">
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-700 mb-1"><i className="ph-fill ph-timer"></i> Dica (seg)</label>
                    <input type="number" disabled={!isHost} value={room.settings.hintTime} onChange={e => updateSetting('hintTime', parseInt(e.target.value))} className="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-slate-800 font-bold focus:ring-2 focus:ring-violet-200 disabled:opacity-80" />
                  </div>
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-700 mb-1"><i className="ph-fill ph-chats"></i> Debate (seg)</label>
                    <input type="number" disabled={!isHost} value={room.settings.discussTime} onChange={e => updateSetting('discussTime', parseInt(e.target.value))} className="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-slate-800 font-bold focus:ring-2 focus:ring-violet-200 disabled:opacity-80" />
                  </div>
                </div>
              </div>
            </div>
            
          </div>
        </div>
      );
    }

    function HintingScreen({ room, user, submitHint }) {
      const state = room.gameState;
      const isImpostor = state.impostorId === user.uid;
      const isMyTurn = state.turnOrder[state.currentTurnIndex] === user.uid;
      const [hintInput, setHintInput] = useState('');
      const [timeLeft, setTimeLeft] = useState(room.settings.hintTime);

      useEffect(() => {
        const int = setInterval(() => setTimeLeft(Math.max(0, Math.ceil((state.turnDeadline - Date.now()) / 1000))), 500);
        return () => clearInterval(int);
      }, [state.turnDeadline]);

      return (
        <div className="flex-1 flex flex-col relative animate-in zoom-in-95 duration-500">
          
          {/* Header do Papel Secreto */}
          <div className="pt-2 pb-10 px-8 text-center text-white relative z-0">
            {isImpostor ? (
              <div className="animate-in slide-in-from-top-4">
                <i className="ph-fill ph-mask-happy text-[80px] drop-shadow-xl mb-2"></i>
                <div className="text-3xl font-black uppercase tracking-widest drop-shadow-md">Impostor!</div>
                <p className="text-white/80 font-medium mt-1">Siga a onda, dê uma dica vaga.</p>
              </div>
            ) : (
              <div className="animate-in slide-in-from-top-4">
                <p className="text-white/70 font-bold uppercase tracking-widest mb-1 text-sm">A palavra é</p>
                <div className="text-4xl sm:text-5xl font-black uppercase tracking-widest drop-shadow-xl bg-white/20 inline-block px-6 py-2 rounded-2xl backdrop-blur-sm border border-white/30">
                  {state.word}
                </div>
              </div>
            )}
          </div>

          {/* Container Principal */}
          <div className="bg-slate-50 rounded-t-[2.5rem] flex-1 w-full p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] relative z-10 flex flex-col">
            
            <div className="flex justify-between items-center mb-6">
              <h3 className="font-black text-xl text-slate-800">Dicas da Rodada</h3>
              <div className={`px-4 py-2 rounded-full font-black text-lg shadow-sm border ${timeLeft <= 5 ? 'bg-red-100 text-red-600 animate-pulse border-red-200' : 'bg-white text-slate-700 border-slate-100'}`}>
                {timeLeft}s
              </div>
            </div>

            <div className="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-24">
              {state.turnOrder.map((uid, idx) => {
                const player = room.players[uid];
                const isThisTurn = idx === state.currentTurnIndex;
                const hasPlayed = idx < state.currentTurnIndex;
                
                return (
                  <div key={uid} className={`bg-white p-4 rounded-3xl flex items-center gap-4 transition-all border shadow-sm
                    ${isThisTurn ? 'border-fuchsia-400 shadow-md transform scale-[1.02]' : hasPlayed ? 'border-slate-100' : 'border-transparent opacity-60 bg-slate-100/50'}
                  `}>
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-white text-lg shrink-0 ${isThisTurn ? 'bg-gradient-to-br from-fuchsia-500 to-orange-400' : 'bg-slate-300'}`}>
                      {player.name.charAt(0).toUpperCase()}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-bold text-sm text-slate-400">{player.name}</div>
                      {hasPlayed && state.hints[uid] ? (
                        <div className="text-slate-800 font-bold text-lg leading-tight mt-1">"{state.hints[uid]}"</div>
                      ) : isThisTurn ? (
                        <div className="text-fuchsia-500 font-bold text-sm mt-1 flex items-center gap-2">
                           Escrevendo <i className="ph-bold ph-pencil-simple animate-pulse"></i>
                        </div>
                      ) : (
                        <div className="text-slate-300 font-medium text-sm mt-1">Aguardando...</div>
                      )}
                    </div>
                    {hasPlayed && <div className="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center shrink-0"><i className="ph-bold ph-check text-emerald-500"></i></div>}
                  </div>
                );
              })}
            </div>

            {/* Input Box Fixado na Base Se for Minha Vez */}
            {isMyTurn && (
              <div className="absolute bottom-6 left-6 right-6 animate-in slide-in-from-bottom-4">
                <form onSubmit={e => { e.preventDefault(); submitHint(hintInput); setHintInput(''); }} className="bg-white p-2 rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.15)] border border-slate-100 flex gap-2">
                  <input 
                    type="text" autoFocus value={hintInput} onChange={e => setHintInput(e.target.value)} 
                    placeholder="Sua dica rápida..." 
                    className="flex-1 bg-transparent px-6 text-slate-800 font-bold focus:outline-none placeholder-slate-300" 
                    maxLength={40} 
                  />
                  <button type="submit" disabled={!hintInput.trim()} className="bg-gradient-to-r from-fuchsia-500 to-orange-400 text-white font-black w-14 h-14 rounded-full flex items-center justify-center shrink-0 transform hover:scale-105 disabled:opacity-50">
                    <i className="ph-bold ph-paper-plane-right text-xl"></i>
                  </button>
                </form>
              </div>
            )}
          </div>
        </div>
      );
    }

    function DiscussingScreen({ room }) {
      const [timeLeft, setTimeLeft] = useState(room.settings.discussTime);
      useEffect(() => {
        const int = setInterval(() => setTimeLeft(Math.max(0, Math.ceil((room.gameState.phaseDeadline - Date.now()) / 1000))), 1000);
        return () => clearInterval(int);
      }, [room.gameState.phaseDeadline]);

      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      return (
        <div className="flex-1 flex flex-col relative animate-in slide-in-from-bottom-8 duration-500">
          
          <div className="pt-8 pb-12 text-center text-white relative z-0 flex flex-col items-center">
            <div className="bg-white/20 p-4 rounded-3xl backdrop-blur-md mb-4 shadow-inner border border-white/30">
               <i className="ph-fill ph-chats-teardrop text-[60px] animate-pulse"></i>
            </div>
            <h2 className="text-3xl font-black uppercase tracking-widest drop-shadow-md">Debate!</h2>
            <div className={`mt-4 text-6xl font-black font-mono tracking-widest drop-shadow-xl ${timeLeft <= 30 ? 'text-red-200 animate-pulse' : 'text-white'}`}>
              {minutes.toString().padStart(2, '0')}:{seconds.toString().padStart(2, '0')}
            </div>
          </div>

          <div className="bg-slate-50 rounded-t-[2.5rem] flex-1 w-full p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] relative z-10">
            <h3 className="font-bold text-slate-400 uppercase tracking-widest text-xs mb-4 text-center">Resumo das Dicas</h3>
            <div className="grid gap-3 overflow-y-auto max-h-[40vh] no-scrollbar pb-10">
              {Object.entries(room.players).map(([uid, player]) => (
                <div key={uid} className="bg-white p-4 rounded-3xl flex gap-3 shadow-sm border border-slate-100">
                  <div className="font-black text-slate-700 w-24 text-sm break-words leading-tight">{player.name}</div>
                  <div className="w-px bg-slate-100"></div>
                  <div className="text-slate-500 font-medium italic flex-1">"{room.gameState.hints[uid] || '---'}"</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function VotingScreen({ room, user, submitVote }) {
      const myVote = room.gameState.votes[user.uid];
      return (
        <div className="flex-1 flex flex-col relative animate-in zoom-in duration-300">
          
          <div className="pt-6 pb-10 px-6 text-center text-white relative z-0">
             <h2 className="text-3xl font-black uppercase tracking-widest drop-shadow-md mb-2">Quem é o Impostor?</h2>
             <p className="text-white/80 text-sm font-medium">Toque no cartão de quem parece perdido.</p>
          </div>

          <div className="bg-slate-50 rounded-t-[2.5rem] flex-1 w-full p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] relative z-10 pb-10 overflow-y-auto no-scrollbar">
            <div className="grid grid-cols-2 gap-4">
              {Object.entries(room.players).map(([uid, player]) => {
                const isSelected = myVote === uid;
                const isMe = uid === user.uid;
                
                return (
                  <button 
                    key={uid} 
                    disabled={isMe || myVote} 
                    onClick={() => submitVote(uid)} 
                    className={`
                      relative p-5 rounded-3xl text-center transition-all duration-300 shadow-sm border-2 flex flex-col items-center gap-3
                      ${isMe ? 'opacity-40 cursor-not-allowed border-slate-100 bg-slate-100' : ''}
                      ${!isMe && !myVote ? 'bg-white border-transparent hover:border-indigo-300 hover:shadow-md' : ''}
                      ${isSelected ? 'bg-indigo-50 border-indigo-500 shadow-md transform scale-105' : ''}
                      ${myVote && !isSelected && !isMe ? 'opacity-50 border-slate-100 bg-white' : ''}
                    `}
                  >
                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center font-black text-white text-2xl shadow-inner ${isSelected ? 'bg-indigo-500' : 'bg-slate-300'}`}>
                      {player.name.charAt(0).toUpperCase()}
                    </div>
                    <div>
                      <div className={`font-black text-sm ${isSelected ? 'text-indigo-700' : 'text-slate-700'}`}>{player.name}</div>
                      {isMe && <div className="text-[10px] text-slate-400 font-bold uppercase mt-1">(Você)</div>}
                    </div>
                    {isSelected && (
                      <div className="absolute -top-3 -right-3 bg-indigo-500 text-white p-1 rounded-full border-4 border-slate-50">
                        <i className="ph-bold ph-check text-xl"></i>
                      </div>
                    )}
                  </button>
                );
              })}
            </div>
            
            {myVote && (
               <div className="mt-8 text-center bg-indigo-100 text-indigo-600 p-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 animate-pulse">
                  <i className="ph-bold ph-hourglass-high"></i> Aguardando os demais votarem...
               </div>
            )}
          </div>
        </div>
      );
    }

    function ResultScreen({ room, isHost, restartGame }) {
      const state = room.gameState;
      const voteCounts = Object.values(state.votes).reduce((acc, uid) => { acc[uid] = (acc[uid] || 0) + 1; return acc; }, {});
      const maxVotes = Math.max(...Object.values(voteCounts), 0);
      const mostVotedUids = Object.keys(voteCounts).filter(uid => voteCounts[uid] === maxVotes);
      const impostorCaught = mostVotedUids.includes(state.impostorId) && mostVotedUids.length === 1;

      return (
        <div className="flex-1 flex flex-col relative animate-in slide-in-from-bottom-10 duration-700">
          
          <div className="pt-8 pb-12 px-6 text-center text-white relative z-0 flex flex-col items-center">
            <div className="text-white/80 font-bold uppercase tracking-widest text-sm mb-2">O Impostor era...</div>
            <div className="text-5xl font-black uppercase tracking-widest drop-shadow-xl bg-white/20 px-8 py-4 rounded-3xl backdrop-blur-md border border-white/30">
              {room.players[state.impostorId]?.name}
            </div>
            <div className="mt-4 font-medium flex items-center gap-2 bg-black/20 px-4 py-2 rounded-full text-sm">
              <i className="ph-fill ph-magnifying-glass"></i> Palavra real: <span className="font-bold">{state.word}</span>
            </div>
          </div>

          <div className="bg-slate-50 rounded-t-[2.5rem] flex-1 w-full p-8 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] relative z-10 pb-10 flex flex-col">
            
            {/* Banner de Resultado */}
            <div className={`-mt-14 mb-8 p-4 rounded-2xl text-center font-black uppercase tracking-widest text-white shadow-lg ${impostorCaught ? 'bg-emerald-500' : 'bg-rose-500'}`}>
               {impostorCaught ? 'Vocês Venceram!' : 'O Impostor Venceu!'}
            </div>

            <h3 className="font-bold text-slate-400 uppercase tracking-widest text-xs mb-4 text-center">Contagem de Votos</h3>
            <div className="space-y-3 mb-auto">
              {Object.entries(room.players).map(([uid, player]) => {
                const isImpostor = uid === state.impostorId;
                const v = voteCounts[uid] || 0;
                if (v === 0 && !isImpostor) return null;
                
                return (
                  <div key={uid} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div className="font-black text-slate-700 flex items-center gap-2">
                       {player.name} 
                       {isImpostor && <i className="ph-fill ph-mask-sad text-rose-500 text-lg"></i>}
                    </div>
                    <div className="flex gap-1">
                      {Array.from({length: v}).map((_, i) => (
                         <div key={i} className="w-3 h-3 rounded-full bg-indigo-500"></div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>

            {isHost && (
               <button 
                 onClick={restartGame} 
                 className="mt-8 w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-white font-black py-5 px-6 rounded-[2rem] shadow-[0_10px_25px_rgba(16,185,129,0.3)] transform hover:-translate-y-1 transition-all flex justify-center items-center gap-2 text-lg"
               >
                 <i className="ph-fill ph-arrow-counter-clockwise text-2xl"></i> Jogar Novamente
               </button>
            )}
          </div>
        </div>
      );
    }

    // ==========================================================
    // INICIALIZAÇÃO DO REACT
    // ==========================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
